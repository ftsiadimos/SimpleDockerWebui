name: Reopen issue on maintainer comment

# Opt into Node.js 24 for JavaScript-based actions to avoid deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  issue_comment:
    types: [created, edited]

jobs:
  reopen_issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Reopen issue when maintainer comments
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SALAMI_TOKEN }}
          script: |
            const comment = context.payload.comment;
            const issue = context.payload.issue;

            // Only act on comments on issues (not PR review comments)
            if (!issue) {
              console.log('Not an issue comment, skipping.');
              return;
            }

            // Maintainers or bot accounts allowed to reopen closed issues
            const allowedUsers = ['ftsiadimos', 'github-actions[bot]'];

            if (!allowedUsers.includes(comment.user.login)) {
              console.log(`Comment by ${comment.user.login} is not in allowed users list, skipping.`);
              return;
            }

            if (issue.state === 'open') {
              console.log('Issue already open. No action required.');
              return;
            }

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: 'open',
            });

            console.log(`Issue #${issue.number} reopened by comment from ${comment.user.login}.`);
