{% extends 'base.html' %}
{% block page_title %}Documentation{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-10">
    <div class="card shadow-sm border-0 mb-4">
      <div class="card-header bg-light border-0 d-flex align-items-center">
        <i class="fas fa-book text-muted me-2 fs-5"></i>
        <h3 class="mb-0">Documentation</h3>
      </div>
      <div class="card-body">
        <p class="text-muted">Guides and reference for LightDockerWebUI features.</p>

        <div class="list-group list-group-flush">
          {% for doc in docs %}
          <a href="{{ url_for('main.docs_page', slug=doc.slug) }}" class="list-group-item list-group-item-action d-flex align-items-center">
            <i class="fas fa-file-alt text-primary me-3"></i>
            <div>
              <div class="fw-semibold">{{ doc.title }}</div>
              <small class="text-muted">{{ doc.description }}</small>
            </div>
            <i class="fas fa-chevron-right ms-auto text-muted"></i>
          </a>
          {% endfor %}
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
